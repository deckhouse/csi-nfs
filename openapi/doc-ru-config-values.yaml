type: object
properties:
  logLevel:
    description: Уровень логирования модуля.
  v3support:
    description: |
      Включает поддержку NFS v3.
      
      При включении данного параметра на узлы будет установлен пакет `rpcbind`.
      
      > При отключении параметра пакет не удаляется автоматически.
  storageClassLabelIgnoredPrefixes:
    description: |
      Список префиксов ключей лейблов, которые не должны распространяться из NFSStorageClass в управляемый Kubernetes StorageClass.

      Контроллер объединяет этот список со встроенным (системным) списком и отбрасывает
      любые лейблы NFSStorageClass, ключ которых начинается с любого префикса из объединения.

      Значения по умолчанию покрывают лейблы, обычно добавляемые GitOps-инструментами
      (Argo CD, Flux, Rancher Fleet), чтобы их reconciler-ы не конкурировали с контроллером
      хранилища за лейблы на управляемом StorageClass.
  tlsParameters:
    description: |
      > Доступно в редакциях SE, SE+, EE, FE.

      Настройка режима RPC-with-TLS ([RFC 9289](https://datatracker.ietf.org/doc/rfc9289/)).
    properties:
      ca:
        description: Корневой сертификат в формате PEM, закодированный в Base64, который будет использован для проверки сертификата NFS-сервера.
      mtls:
        description: Настройка режима проверки NFS-сервером сертификата клиента.
        properties:
          clientCert:
            description: Клиентский сертификат в формате PEM, закодированный в Base64.
          clientKey:
            description: Клиентский ключ в формате PEM, закодированный в Base64.
