x-extend:
  schema: config-values.yaml
type: object
properties:
  internal:
    type: object
    default: {}
    properties:
      featureTLSEnabled:
        type: boolean
        default: true
      pythonVersions:
        type: array
        default: []
        items:
          type: string
      customWebhookCert:
        type: object
        default: {}
        x-required-for-helm:
          - crt
          - key
          - ca
        properties:
          crt:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
          key:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
          ca:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
      customSchedulerExtenderCert:
        type: object
        default: {}
        x-required-for-helm:
          - crt
          - key
          - ca
        properties:
          crt:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
          key:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
          ca:
            type: string
            x-examples: ["YjY0ZW5jX3N0cmluZwo="]
      shedulerExtenderEnabled:
        type: boolean
        default: false
      storageClassLabelIgnoredPrefixesSystem:
        type: array
        description: |
          System list of label-key prefixes that MUST NOT be propagated from
          an NFSStorageClass to the managed Kubernetes StorageClass.
          This list is hardcoded and cannot be changed by users.
        default:
          - app.kubernetes.io/managed-by
          - app.kubernetes.io/instance
          - kubernetes.io/
          - k8s.io/
          - storage.deckhouse.io/managed-by
        items:
          type: string
  registry:
    type: object
    description: "System field, overwritten by Deckhouse. Don't use"
