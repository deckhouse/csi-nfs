---
# do not remove this image: used in external audits (DKP CSE)
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
fromImage: builder/src
final: false

secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}

shell:
  beforeInstall:
    - git clone --depth 1 --branch {{ include "get_oss_version_by_id" (list "kmod" .) }} $(cat /run/secrets/SOURCE_REPO)/kmod-project/kmod.git /src/kmod
    - rm -rf /src/kmod/.git

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
fromImage: base/distroless
git:
{{- include "image mount points" . }}
import:
  - image: tools/kmod
    add: /bin
    to: /opt/deckhouse/csi/bin
    before: setup
