---
# do not remove this image: used in external audits (DKP CSE)
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
from: {{ index $.Images "builder/src" }}
final: false
git:
  - add: {{ .ModuleDir }}
    to: /patches
    includePaths:
      - images/{{ $.ImageName }}/patches
    stageDependencies:
      install:
        - '**/*'
  - add: {{ .ModuleDir }}
    to: /src/csi-nfs
    includePaths:
      - lib/go
    stageDependencies:
      install:
        - '**/*'

secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}

shell:
  install:
    - git clone --depth 1 --branch v{{ include "get_oss_version_by_id" (list "csi-driver-nfs" .) }} $(cat /run/secrets/SOURCE_REPO)/kubernetes-csi/csi-driver-nfs.git /src/csi-driver-nfs
    - cd /src/csi-driver-nfs
    - for patchfile in /patches/images/{{ $.ImageName }}/patches/*.patch; do echo "Apply ${patchfile} ... "; git apply ${patchfile} --verbose; done
    - cp -R /patches/images/{{ $.ImageName }}/patches/csi-driver-nfs/* ./
    - rm -rf /src/csi-driver-nfs/.git vendor

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
from: {{ index $.Images (eq .SVACE_ENABLED "false" | ternary "builder/golang" "builder/alpine-svace") }}
final: false

import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
    add: /src
    to: /src
    before: install

mount:
{{ include "mount points for golang builds" . }}

secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}

shell:
  setup:
    {{- if eq .SVACE_ENABLED "false" }}
    - pm install git
    {{- else }}
    {{- include "alpine packages proxy" . | nindent 4 }}
    - apk add --no-cache git
    {{- end }}
    - cd /src/csi-driver-nfs/cmd/nfsplugin
    - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
    - export GOOS=linux GOARCH=amd64 CGO_ENABLED=0
    - |
      {{- include "image-build.build" (set $ "BuildCommand" (printf `go build -ldflags="-s -w" -tags "%s" -o /%s` .MODULE_EDITION $.ImageName)) | nindent 6 }}
    - chmod +x /{{ $.ImageName }}

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
from: {{ index $.Images "builder/distroless" }}
import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
    add: /{{ $.ImageName }}
    to: /{{ $.ImageName }}
    before: install
  - image: {{ .ModuleNamePrefix }}wrap-mount
    add: /bin
    to: /bin
    before: install
git:
{{- include "image mount points" . }}
shell:
  setup:
    - pm install libtirpc util-linux coreutils gnu-glibc nfs-utils
imageSpec:
  config:
    entrypoint: ["/{{ $.ImageName }}"]
---
{{- include "vex mitigation" (list $ $.ImageName) }}
