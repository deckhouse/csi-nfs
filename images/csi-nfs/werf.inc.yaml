---
# do not remove this image: used in external audits (DKP CSE)
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
from: {{ index $.Images "builder/src" }}
final: false
git:
  - add: {{ .ModuleDir }}
    to: /patches
    includePaths:
      - images/{{ $.ImageName }}/patches
    stageDependencies:
      install:
        - '**/*'
  - add: {{ .ModuleDir }}
    to: /src/csi-nfs
    includePaths:
      - lib/go
    stageDependencies:
      install:
        - '**/*'

secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}

shell:
  install:
    - git clone --depth 1 --branch {{ include "get_oss_version_by_id" (list "nfs-utils" .) }} $(cat /run/secrets/SOURCE_REPO)/steved/nfs-utils.git /src/nfs-utils
    - git clone --depth 1 --branch v{{ include "get_oss_version_by_id" (list "csi-driver-nfs" .) }} $(cat /run/secrets/SOURCE_REPO)/kubernetes-csi/csi-driver-nfs.git /src/csi-driver-nfs
    - cd /src/csi-driver-nfs
    - for patchfile in /patches/images/{{ $.ImageName }}/patches/*.patch; do echo "Apply ${patchfile} ... "; git apply ${patchfile} --verbose; done
    - cp -R /patches/images/{{ $.ImageName }}/patches/csi-driver-nfs/* ./
    - rm -rf /src/csi-driver-nfs/.git vendor
    - rm -rf /src/nfs-utils/.git

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
from: {{ index $.Images (eq .SVACE_ENABLED "false" | ternary "builder/golang-alpine" "builder/alpine-svace") }}
final: false

import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
    add: /src
    to: /src
    before: install

mount:
{{ include "mount points for golang builds" . }}

secrets:
- id: GOPROXY
  value: {{ .GOPROXY }}

shell:
  setup:
    {{- if eq .SVACE_ENABLED "false" }}
    {{- include "alpine packages proxy" . | nindent 4 }}    
    - apk add --no-cache git
    {{- else }}
    - apt-get update 
    - apt-get install -y git
    {{- end }}
    - cd /src/csi-driver-nfs/cmd/nfsplugin
    - GOPROXY=$(cat /run/secrets/GOPROXY) go mod download
    - export GOOS=linux GOARCH=amd64 CGO_ENABLED=0
    - |
      {{- include "image-build.build" (set $ "BuildCommand" (printf `go build -ldflags="-s -w" -tags "%s" -o /%s` .MODULE_EDITION $.ImageName)) | nindent 6 }}
    - chmod +x /{{ $.ImageName }}

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
from: {{ index $.Images "base/distroless" }}
import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-golang-artifact
    add: /{{ $.ImageName }}
    to: /{{ $.ImageName }}
    before: install
  - from: {{ index $.Images "nfs-utils" }}
    add: /lib
    to: /lib
    before: install
  - from: {{ index $.Images "nfs-utils" }}
    add: /sbin
    to: /sbin
    before: install
  - from: {{ index $.Images "nfs-utils" }}
    add: /usr
    to: /usr
    before: install
  - from: {{ index $.Images "nfs-utils" }}
    add: /var
    to: /var
    before: install
  - from: {{ index $.Images "gnu-glibc" }}
    add: /
    to: /
    before: install
    includePaths:
      - lib64/libnss_files.so.2
      - lib64/libnss_dns.so.2
  - from: {{ index $.Images "coreutils" }}
    add: /
    to: /
    before: install
    includePaths:
      - usr/bin/cp
      - usr/bin/shred
  - from: {{ index $.Images "util-linux" }}
    add: /bin/mount
    to: /bin/originalmount
    before: install
  - from: {{ index $.Images "util-linux" }}
    add: /bin/umount
    to: /bin/originalumount
    before: install
  - from: {{ index $.Images "libtirpc" }}
    add: /usr/etc/netconfig
    to: /etc/netconfig
    before: install
  - image: {{ .ModuleNamePrefix }}wrap-mount
    add: /bin
    to: /bin
    before: install
git:
{{- include "image mount points" . }}
imageSpec:
  config:
    entrypoint: ["/{{ $.ImageName }}"]
---
{{- include "vex mitigation" (list $ (printf "%s/%s" $.ModuleName $.ImageName )) }}
