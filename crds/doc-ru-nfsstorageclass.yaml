spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            Интерфейс управления StorageClass для CSI-драйвера `nfs.csi.k8s.io`.

            Ручное создание StorageClass для данного драйвера запрещено.
          properties:
            spec:
              description: |
                Определяет конфигурацию StorageClass.
              properties:
                connection:
                  description: |
                    Настройки NFS-сервера.
                  properties:
                    host:
                      description: |
                        Адрес NFS-сервера.
                    share:
                      description: |
                        Путь к точке монтирования на NFS-сервере.
                    nfsVersion:
                      description: |
                        Версия NFS.
                    tls:
                      description: |
                        > Доступно в редакциях SE, SE+, EE, FE.

                        Использовать ли TLS для подключения.
                    mtls:
                      description: |
                        > Доступно в редакциях SE, SE+, EE, FE.

                        Использовать ли mTLS — требует, чтобы TLS был включён.
                mountOptions:
                  description: |
                    Опции монтирования.
                  properties:
                    mountMode:
                      description: |
                        Режим монтирования NFS-раздела.
                    timeout:
                      description: |
                        Время, в течение которого клиент NFS ожидает ответа, прежде чем повторить запрос, в десятых долях секунды.

                        Например, 600 — это 60 секунд.
                    retransmissions:
                      description: |
                        Количество повторных попыток клиента NFS выполнить запрос, прежде чем он предпримет дальнейшие действия по восстановлению соединения.
                    readOnly:
                      description: |
                        Монтирование в режиме «только чтение» (read-only).
                chmodPermissions:
                  description: |
                    Права для chmod, которые будут применены к субдиректории тома в NFS-разделе.
                reclaimPolicy:
                  description: |
                    Задаёт режим поведения при удалении PersistentVolumeClaim (PVC).
                    
                    Допустимые значения:

                    - `Delete` — при удалении PVC также удаляется связанный PersistentVolume (PV) и соответствующие данные на NFS-сервере;
                    - `Retain` — при удалении PVC связанные PersistentVolume и данные на NFS-сервере не удаляются и требуют ручного удаления пользователем. Подробнее [в документации Kubernetes](https://kubernetes.io/docs/concepts/storage/persistent-volumes/#reclaiming).
                volumeBindingMode:
                  description: |
                    Задаёт режим создания тома.
                    
                    Допустимые значения:

                    - `Immediate` — том создаётся сразу после создания PVC;
                    - `WaitForFirstConsumer` — том создаётся только при первом использовании PVC со стороны пода. Подробнее [в документации Kubernetes](https://kubernetes.io/docs/concepts/storage/storage-classes/#volume-binding-mode).
                workloadNodes:
                  type: object
                  minProperties: 1
                  properties:
                    nodeSelector:
                      description: |
                        Селектор узлов для определения правил выбора узлов, на которых Persistent Volumes (PVs), созданные этим StorageClass, могут подключаться.
                        
                        Комбинирует простое сопоставление лейблов и сложные выражения для фильтрации узлов.
                        
                        Если этот параметр пропущен, общие ресурсы NFS можно монтировать на любом узле кластера, работающем под управлением ОС Linux.
                      properties:
                        matchLabels:
                          description: |
                            Карта лейблов, которые должны точно совпадать с лейблами узла.
                            
                            Узлы, которые не соответствуют хотя бы одному из указанных лейблов, будут исключены.
                        matchExpressions:
                          description: |
                            Список сложных условий выбора узлов.
                            
                            Каждое условие задаёт ключ, оператор и, при необходимости, значения для фильтрации узлов на основе их лейблов или других полей.
                volumeCleanup:
                  description: |
                    > Функция доступна в Enterprise Edition.

                    Метод очистки содержимого субдиректории PV перед удалением.

                    Если параметр не задан, драйвер NFS CSI удаляет каталог, созданный для PV на NFS-сервере, без очистки данных.
                    Если параметр задан, драйвер стирает каждый файл в каталоге PV.

                    Допустимые значения:

                    - `Discard` — используется функция Discard (trim) файловой системы для освобождения блоков данных (эта опция доступна только если она поддерживается, например, в NFSv4.2);
                    - `RandomFillSinglePass` — перед удалением содержимое каждого файла перезаписывается случайными данными один раз. Реализуется путём вызова утилиты `shred`;
                    - `RandomFillThreePass` — перед удалением содержимое каждого файла перезаписывается случайными данными три раза. Реализуется путём вызова утилиты `shred`.
            status:
              description: |
                Текущая информация о StorageClass.
              properties:
                phase:
                  description: |
                    Общее текущее состояние StorageClass.
                    
                    Возможные значения: 

                    - `Failed` — контроллер получил некорректную конфигурацию ресурса или возникли ошибки в процессе выполнения операции;
                    - `Created` — StorageClass создан успешно.
                reason:
                  description: |
                    Дополнительная информация о текущем состоянии StorageClass.
