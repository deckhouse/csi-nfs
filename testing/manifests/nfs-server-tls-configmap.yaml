apiVersion: v1
kind: ConfigMap
metadata:
  name: nfs-server-tls-startup
  namespace: nfs-test
data:
  start.sh: |
    #!/bin/bash
    set -euo pipefail

    dnf install -y -q nfs-utils ktls-utils procps-ng

    if ! test -r /proc/net/handshake; then
      echo "ERROR: /proc/net/handshake is missing on this node" >&2
      echo "NFS TLS requires kernel CONFIG_NET_HANDSHAKE (Linux 6.5+)." >&2
      exit 1
    fi

    mkdir -p /etc/ssl/tlshd /exports
    install -m 644 /tls/ca.crt /etc/ssl/tlshd/ca.crt
    install -m 644 /tls/server.crt /etc/ssl/tlshd/nfs.crt
    install -m 600 /tls/server.key /etc/ssl/tlshd/nfs_tlshd.key

    cat > /etc/tlshd.conf <<'EOF'
    [debug]
    loglevel=2
    tls=2
    nl=0

    [authenticate]

    [authenticate.client]

    [authenticate.server]
    x509.truststore= /etc/ssl/tlshd/ca.crt
    x509.certificate= /etc/ssl/tlshd/nfs.crt
    x509.private_key= /etc/ssl/tlshd/nfs_tlshd.key
    EOF

    echo '/exports *(rw,sync,no_subtree_check,no_root_squash,insecure,xprtsec=tls)' > /etc/exports

    rpcbind -w
    tlshd -s &
    for _ in $(seq 1 30); do
      ps -C tlshd >/dev/null 2>&1 && break
      sleep 1
    done
    ps -C tlshd >/dev/null 2>&1

    rpc.nfsd 8
    exportfs -arv
    rpc.mountd

    exec sleep infinity
