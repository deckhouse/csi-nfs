# Заполните base64-значения сертификатов с внешнего TLS NFS-сервера.
# cat /etc/ssl/tlshd/ca.crt | base64 -w0
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: csi-nfs
spec:
  enabled: true
  version: 1
  settings:
    v3support: true
    tlsParameters:
      ca: REPLACE_WITH_CA_CRT_BASE64
      mtls:
        clientCert: REPLACE_WITH_CLIENT_CRT_BASE64
        clientKey: REPLACE_WITH_CLIENT_KEY_BASE64
