# Заполните base64-значения из Secret nfs-server-tls-certs перед применением.
# kubectl get secret -n nfs-test nfs-server-tls-certs -o jsonpath='{.data.ca\.crt}{"\n"}'
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: csi-nfs
spec:
  enabled: true
  version: 1
  settings:
    v3support: true
    tlsParameters:
      ca: REPLACE_WITH_CA_CRT_BASE64
      mtls:
        clientCert: REPLACE_WITH_CLIENT_CRT_BASE64
        clientKey: REPLACE_WITH_CLIENT_KEY_BASE64
