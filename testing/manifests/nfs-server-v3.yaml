---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server-v3
  namespace: nfs-test
  labels:
    app: nfs-server-v3
spec:
  selector:
    app: nfs-server-v3
  ports:
    - name: nfs-tcp
      port: 2049
      protocol: TCP
    - name: nfs-udp
      port: 2049
      protocol: UDP
    - name: rpcbind-tcp
      port: 111
      protocol: TCP
    - name: rpcbind-udp
      port: 111
      protocol: UDP
    - name: mountd-tcp
      port: 32767
      protocol: TCP
    - name: mountd-udp
      port: 32767
      protocol: UDP
    - name: statd-in-tcp
      port: 32765
      protocol: TCP
    - name: statd-in-udp
      port: 32765
      protocol: UDP
    - name: statd-out-tcp
      port: 32766
      protocol: TCP
    - name: statd-out-udp
      port: 32766
      protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server-v3
  namespace: nfs-test
  labels:
    app: nfs-server-v3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server-v3
  template:
    metadata:
      labels:
        app: nfs-server-v3
    spec:
      initContainers:
        - name: load-nfs-kernel-modules
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - modprobe nfs && modprobe nfsd
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_MODULE
          volumeMounts:
            - name: host-modules
              mountPath: /lib/modules
              readOnly: true
      containers:
        - name: nfs-server
          image: ghcr.io/obeone/nfs-server:latest
          env:
            - name: NFS_VERSION
              value: "3"
            - name: NFS_EXPORT_0
              value: "/exports *(rw,sync,no_subtree_check,no_root_squash,insecure)"
            - name: NFS_PORT_MOUNTD
              value: "32767"
            - name: NFS_PORT_STATD_IN
              value: "32765"
            - name: NFS_PORT_STATD_OUT
              value: "32766"
          ports:
            - containerPort: 2049
              protocol: TCP
            - containerPort: 2049
              protocol: UDP
            - containerPort: 111
              protocol: TCP
            - containerPort: 111
              protocol: UDP
            - containerPort: 32767
              protocol: TCP
            - containerPort: 32767
              protocol: UDP
            - containerPort: 32765
              protocol: TCP
            - containerPort: 32765
              protocol: UDP
            - containerPort: 32766
              protocol: TCP
            - containerPort: 32766
              protocol: UDP
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_MODULE
          volumeMounts:
            - name: data
              mountPath: /exports
            - name: host-modules
              mountPath: /lib/modules
              readOnly: true
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - grep -q '+3' /proc/fs/nfsd/versions
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
        - name: host-modules
          hostPath:
            path: /lib/modules
            type: Directory
